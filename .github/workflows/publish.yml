name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch: # Allows you to click a button to run it manually

permissions:
  contents: read
  id-token: write # CRITICAL for PyPI Trusted Publishers

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/omnipulse
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"
    - name: Install build dependencies
      run: python -m pip install --upgrade pip build
    - name: Build package
      working-directory: ./open-source-wst
      run: python -m build
    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: ./open-source-wst/dist/
